<!--
  BWM Shared Component — Evidence Tag
  Small uppercase pill with copper border + copper text. Tags benchmark stats
  and any other claim with provenance. NEVER use on unmeasured claims (per
  Claims Policy — Brand Guidelines). Used across industries/* (v21 RESPINE).
  Usage:
    <span class="evidence-tag">Benchmark · 12-mo client median</span>
    <span class="evidence-tag">Audit · 2026-04-24</span>
  Variables --copper, --font-heading must be defined upstream.
-->

<style>
.evidence-tag{display:inline-block;margin-top:6px;margin-bottom:20px;padding:4px 10px;border:0.5px solid var(--copper);border-radius:3px;font-family:var(--font-heading);font-size:11px;letter-spacing:0.12em;color:var(--copper);text-transform:uppercase;font-weight:600}
</style>
